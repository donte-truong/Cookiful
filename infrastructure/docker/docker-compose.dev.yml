name: cookiful

services:
  postgres:
    image: postgres:16
    container_name: cookiful-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cookiful
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cookiful"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    container_name: cookiful-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: cookiful-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cookiful
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: cookiful-local-access-secret
      JWT_REFRESH_SECRET: cookiful-local-refresh-secret
    ports:
      - "4000:4000"
    volumes:
      - ../..:/workspace

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: cookiful-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - web_node_modules:/workspace/node_modules
      - web_next:/workspace/apps/web/.next

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cookiful-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cookiful.dev
      PGADMIN_DEFAULT_PASSWORD: cookiful
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
  web_node_modules:
  web_next:
