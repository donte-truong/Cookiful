name: Deploy web to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NEXT_TELEMETRY_DISABLED: "1"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web-pages.yml"
      - "apps/web/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Derive Pages base path
        shell: bash
        run: |
          if [ -n "${{ vars.NEXT_PUBLIC_BASE_PATH }}" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=${{ vars.NEXT_PUBLIC_BASE_PATH }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
          fi

      - name: Validate deployment variables
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        shell: bash
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "NEXT_PUBLIC_API_URL must be set to the Render API URL, for example https://cookiful-api.onrender.com/api."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Disable Next API route handlers for static export
        shell: bash
        run: |
          find apps/web/src/app/api -name route.ts -print -exec sh -c 'mv "$1" "$1.static-export-disabled"' sh {} \;

      - name: Build static web export
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STATIC_EXPORT: "true"
        run: bun --filter @cookiful/web build

      - name: Disable Jekyll processing
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/out
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
